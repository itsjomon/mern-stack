<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <H3>Main Heading</H3>
    <h2>Sub Heading</h2>
    <p>This is a paragraph</P>
</body>
</html>

<!-- HTML is not case-sensitive. <H3> and <h3> both work the same. However, using lowercase is the standard practice. -->
