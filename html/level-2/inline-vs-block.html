<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Block elements -->
    <h1>hello world</h1>
    <h2>SDE</h2>
    <P>Lorem ipsum dolor sit amet.</P>
    
    <!-- Inline elements -->
    <a href="">youtube</a> 
    <a href="">google</a>
    <img src="image.png">
    <img src="image.png">
</body>
</html>

<!-- Block element takes the full-width available (whole block), start from new line. -->

<!-- Inline element takes up only necessary width, Dont start from new line. -->

<!-- Examples of inline elements: a, span, img, br, etc. -->

<!-- Examples of block elements: div, p, h1, h2, h3, ul, ol, li, table, header, footer, section, article, nav, etc. -->
