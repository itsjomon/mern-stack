<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lists in HTML</title>
</head>
<body>
    <ul><!--Unordered list-->
        <li>Mango</li>
        <li>Apple</li>
        <li>Dosa</li>
    </ul>
    <ol><!--Ordered list-->
        <li>Mango</li>
        <li>Apple</li>
        <li>Dosa</li>
    </ol>
    <ol type="a"><!--Ordered list-->
        <li>Mango</li>
        <li>Apple</li>
        <li>Dosa</li>
    </ol>
    <ol type="i"><!--Ordered list-->
        <li>Mango</li>
        <li>Apple</li>
        <li>Dosa</li>
    </ol>
</body>
</html>
